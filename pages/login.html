<div class="flex flex-col items-center justify-center min-h-[80vh] px-6">
    <div class="w-full max-w-md bg-[#0f172a]/90 border border-slate-800 rounded-3xl p-8 shadow-2xl backdrop-blur-xl">
        
        <div class="flex flex-col items-center mb-8">
            <div class="w-16 h-16 bg-gradient-to-br from-[#f19006] to-[#d88105] rounded-2xl flex items-center justify-center shadow-lg shadow-amber-500/20 mb-3">
                <svg class="w-9 h-9 text-[#060913]" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
                </svg>
            </div>
            <h2 class="text-2xl font-black italic text-white tracking-tight">PLAYER <span class="text-[#f19006]">LOGIN</span></h2>
            <p class="text-xs text-slate-400 mt-1 uppercase tracking-widest font-semibold">Enter the arena</p>
        </div>

        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Email Address</label>
                <input type="email" id="login-email" required 
                    class="w-full bg-[#060913] border border-slate-800 rounded-xl px-4 py-3.5 text-white placeholder-slate-600 focus:outline-none focus:border-[#f19006] transition-all text-sm" 
                    placeholder="name@example.com">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Password</label>
                <input type="password" id="login-password" required 
                    class="w-full bg-[#060913] border border-slate-800 rounded-xl px-4 py-3.5 text-white placeholder-slate-600 focus:outline-none focus:border-[#f19006] transition-all text-sm" 
                    placeholder="••••••••">
            </div>

            <button type="submit" id="btn-login-submit"
                class="w-full bg-gradient-to-r from-[#f19006] to-[#d88105] text-[#060913] font-bold py-3.5 rounded-xl shadow-lg shadow-amber-500/10 hover:shadow-amber-500/20 active:scale-[0.98] transition-all text-sm uppercase tracking-wider mt-2">
                Sign In
            </button>
        </form>

        <div class="text-center mt-6">
            <p class="text-xs text-slate-400">Don't have an account? <span class="text-[#f19006] font-semibold cursor-pointer hover:underline">Register here</span></p>
        </div>
    </div>
</div>

<script>
    (function() {
        // ফায়ারবেস অথেন্টিকেশন মডিউল ইমপোর্ট
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('btn-login-submit');

        if (!loginForm) return;

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            
            // বাটন ডিজেবল ও লোডিং স্টেট করা
            loginBtn.disabled = true;
            loginBtn.innerText = "Authenticating...";

            try {
                // উইন্ডো অবজেক্টে সেভ থাকা গ্লোবাল auth ব্যবহার করে সাইন-ইন
                const userCredential = await signInWithEmailAndPassword(window.auth, email, password);
                console.log("Login successful:", userCredential.user.uid);
                
                // রাউটার দিয়ে হোম পেজে পাঠানো
                window.location.hash = "home";
            } catch (error) {
                console.error("Login error:", error);
                
                // প্রফেশনাল ইউজার ফ্রেন্ডলি এরর হ্যান্ডলিং
                let errorMsg = "Failed to login. Please try again.";
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                    errorMsg = "Invalid email or password!";
                } else if (error.code === 'auth/too-many-requests') {
                    errorMsg = "Too many attempts. Account temporarily locked.";
                }
                
                alert(errorMsg);
            } finally {
                // বাটন রিসেট
                if (loginBtn) {
                    loginBtn.disabled = false;
                    loginBtn.innerText = "Sign In";
                }
            }
        });

        // সিকিউরিটি চেক: যদি প্লেয়ার ইতিমধ্যে লগইন থাকে, তাকে হোমে পাঠিয়ে দাও
        if (window.auth && window.auth.currentUser) {
            window.location.hash = "home";
        }
    })();
</script>
