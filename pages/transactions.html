<div class="px-4 py-4 space-y-6">
    
    <div class="flex items-center gap-3">
        <button onclick="window.location.hash = 'wallet'" class="w-10 h-10 bg-[#0f172a] border border-slate-800 rounded-xl flex items-center justify-center text-slate-400 active:scale-95 transition-all">
            ←
        </button>
        <div>
            <h2 class="text-sm font-black uppercase tracking-wider text-slate-400">History</h2>
            <h3 class="text-base font-bold text-white">Transaction Ledger</h3>
        </div>
    </div>

    <div class="bg-[#0f172a] border border-slate-800 rounded-3xl p-5 space-y-4">
        <div class="flex justify-between items-center border-b border-slate-850 pb-3 mb-2">
            <h4 class="text-xs font-black text-slate-300 uppercase tracking-wider">Recent Activity</h4>
            <span class="text-[10px] text-slate-500 font-bold">Real-time sync</span>
        </div>
        
        <div id="tx-history-container" class="space-y-3">
            <div class="text-center py-8 text-slate-500 text-xs animate-pulse">
                Reading block data...
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        import { collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

        const container = document.getElementById('tx-history-container');
        const user = window.auth.currentUser;

        if (!user) {
            window.location.hash = "login";
            return;
        }

        async function loadTransactionHistory() {
            if (!container) return;

            try {
                // ইউজারের নিজস্ব পেমেন্ট রিকোয়েস্টগুলো সময় অনুযায়ী সাজিয়ে আনা
                const q = query(
                    collection(window.db, "paymentRequests"), 
                    where("uid", "==", user.uid),
                    orderBy("createdAt", "desc")
                );
                
                const querySnapshot = await getDocs(q);
                container.innerHTML = '';

                if (querySnapshot.empty) {
                    container.innerHTML = `
                        <div class="text-center py-8 text-slate-600 text-xs">
                            <span class="text-xl block mb-2">💸</span>
                            No transactions found yet.
                        </div>`;
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const tx = doc.data();
                    const isDeposit = tx.type === 'deposit';
                    
                    // স্ট্যাটাস অনুযায়ী ব্যাজের কালার ডিফাইন করা
                    let statusClass = "bg-amber-500/10 text-amber-500 border-amber-500/20";
                    if (tx.status === 'approved') statusClass = "bg-emerald-500/10 text-emerald-400 border-emerald-500/20";
                    if (tx.status === 'rejected') statusClass = "bg-red-500/10 text-red-400 border-red-500/20";

                    // হেল্পার মডিউল দিয়ে টাইম ফরম্যাট করা
                    const txTime = window.Helpers ? window.Helpers.formatMatchTime(tx.createdAt) : "Just now";

                    const cardHTML = `
                        <div class="bg-[#060913] border border-slate-900 rounded-2xl p-4 flex justify-between items-center shadow-sm">
                            <div class="space-y-1">
                                <div class="flex items-center gap-2">
                                    <span class="text-xs font-bold text-white uppercase">${isDeposit ? '💰 Added Money' : '📤 Withdrawal'}</span>
                                    <span class="text-[9px] font-extrabold px-1.5 py-0.5 rounded border ${statusClass} uppercase tracking-wider">
                                        ${tx.status}
                                    </span>
                                </div>
                                <p class="text-[10px] text-slate-500">${txTime}</p>
                                <p class="text-[9px] text-slate-600 font-mono">Ref: ${isDeposit ? tx.utr : tx.upi}</p>
                            </div>
                            <div class="text-right">
                                <span class="text-sm font-black ${isDeposit ? 'text-amber-500' : 'text-red-400'}">
                                    ${isDeposit ? '+' : '-'} ₹${tx.amount}
                                </span>
                            </div>
                        </div>`;
                    
                    container.innerHTML += cardHTML;
                });

            } catch (error) {
                console.error("Error fetching transactions:", error);
                // Firestore-এ ইনডেক্স ক্রিয়েট না থাকলে orderBy এরর দিতে পারে, সেজন্য সেফ ফলব্যাক
                container.innerHTML = '<div class="text-center py-8 text-red-500 text-xs">Failed to load ledger records.</div>';
            }
        }

        loadTransactionHistory();
    })();
</script>
