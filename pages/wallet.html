<div class="px-4 py-4 space-y-6">
    
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-[#0f172a] border border-slate-800 rounded-xl flex items-center justify-center text-slate-400">
            💼
        </div>
        <div>
            <h2 class="text-sm font-black uppercase tracking-wider text-slate-400">My Account</h2>
            <h3 class="text-base font-bold text-white">Wallet Dashboard</h3>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div class="bg-[#0f172a] border border-slate-800 rounded-3xl p-5 relative overflow-hidden shadow-xl">
            <span class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Deposit Balance</span>
            <span id="wall-deposit" class="text-xl font-black text-white">₹00</span>
            <p class="text-[9px] text-slate-400 mt-2">Used for joining matches</p>
        </div>
        <div class="bg-[#0f172a] border border-slate-800 rounded-3xl p-5 relative overflow-hidden shadow-xl">
            <span class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Winnings Cash</span>
            <span id="wall-winnings" class="text-xl font-black text-emerald-400">₹00</span>
            <p class="text-[9px] text-slate-400 mt-2">Directly withdrawable</p>
        </div>
    </div>

    <div class="bg-[#0f172a] border border-slate-800 rounded-3xl p-6 shadow-2xl">
        <div class="flex border-b border-slate-800 pb-3 mb-5 gap-4">
            <button onclick="switchWalletTab('deposit-tab')" id="btn-tab-dep" class="text-xs font-black uppercase tracking-wider text-[#f19006] border-b-2 border-[#f19006] pb-1 transition-all">
                Add Money
            </button>
            <button onclick="switchWalletTab('withdraw-tab')" id="btn-tab-with" class="text-xs font-black uppercase tracking-wider text-slate-500 pb-1 transition-all">
                Withdraw
            </button>
        </div>

        <div id="deposit-tab" class="wallet-tab-content space-y-4">
            <div class="bg-[#060913] border border-slate-900 rounded-2xl p-4 text-center">
                <p class="text-xs text-slate-400">Pay via UPI QR / PhonePe to: <span class="text-white font-bold tracking-wide">proplayeradda@upi</span></p>
            </div>
            <form id="deposit-request-form" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Amount to Add (₹)</label>
                    <input type="number" id="dep-amount" min="10" required 
                        class="w-full bg-[#060913] border border-slate-800 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-[#f19006] transition-all text-sm" 
                        placeholder="Min ₹10">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Transaction ID / UTR Number</label>
                    <input type="text" id="dep-utr" required 
                        class="w-full bg-[#060913] border border-slate-800 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-[#f19006] transition-all text-sm" 
                        placeholder="12 digit Ref number">
                </div>
                <button type="submit" id="btn-dep-submit" class="w-full bg-gradient-to-r from-[#f19006] to-[#d88105] text-[#060913] font-bold py-3.5 rounded-xl text-xs uppercase tracking-wider font-black">
                    Submit Request
                </button>
            </form>
        </div>

        <div id="withdraw-tab" class="wallet-tab-content hidden space-y-4">
            <form id="withdraw-request-form" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Withdraw Amount (₹)</label>
                    <input type="number" id="with-amount" min="50" required 
                        class="w-full bg-[#060913] border border-slate-800 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-[#f19006] transition-all text-sm" 
                        placeholder="Min ₹50">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Your UPI ID / Phone Number</label>
                    <input type="text" id="with-upi" required 
                        class="w-full bg-[#060913] border border-slate-800 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-[#f19006] transition-all text-sm" 
                        placeholder="example@upi">
                </div>
                <button type="submit" id="btn-with-submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-[#060913] font-bold py-3.5 rounded-xl text-xs uppercase tracking-wider font-black">
                    Withdraw Cash
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    (function() {
        import { collection, addDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

        // ১. গ্লোবাল স্টেট থেকে ইউজারের লাইভ ব্যালেন্স রেন্ডার করা
        function renderBalances() {
            const data = window.currentPlayerData || { deposit: 0, winnings: 0 };
            document.getElementById('wall-deposit').innerText = `₹${data.deposit || 0}`;
            document.getElementById('wall-winnings').innerText = `₹${data.winnings || 0}`;
        }
        
        renderBalances();

        // কাস্টম ইন্টারভাল বা টাইমআউট দিয়ে লাইভ ডাটা লোড নিশ্চিত করা
        setTimeout(renderBalances, 200);

        // ২. ট্যাব সুইচিং লজিক
        window.switchWalletTab = (tabId) => {
            document.querySelectorAll('.wallet-tab-content').forEach(tab => tab.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');

            const depBtn = document.getElementById('btn-tab-dep');
            const withBtn = document.getElementById('btn-tab-with');

            if (tabId === 'deposit-tab') {
                depBtn.className = "text-xs font-black uppercase tracking-wider text-[#f19006] border-b-2 border-[#f19006] pb-1 transition-all";
                withBtn.className = "text-xs font-black uppercase tracking-wider text-slate-500 pb-1 transition-all";
            } else {
                withBtn.className = "text-xs font-black uppercase tracking-wider text-emerald-400 border-b-2 border-emerald-500 pb-1 transition-all";
                depBtn.className = "text-xs font-black uppercase tracking-wider text-slate-500 pb-1 transition-all";
            }
        };

        // ৩. ডিপোজিট রিকোয়েস্ট হ্যান্ডেলার
        const depForm = document.getElementById('deposit-request-form');
        if (depForm) {
            depForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('btn-dep-submit');
                const amount = Number(document.getElementById('dep-amount').value);
                const utr = document.getElementById('dep-utr').value.trim();

                btn.disabled = true;
                btn.innerText = "Submitting...";

                try {
                    await addDoc(collection(window.db, "paymentRequests"), {
                        uid: window.auth.currentUser.uid,
                        email: window.auth.currentUser.email,
                        amount: amount,
                        utr: window.Helpers ? window.Helpers.sanitizeInput(utr) : utr,
                        type: "deposit",
                        status: "pending",
                        createdAt: new Date()
                    });
                    alert("🎉 Deposit Request Submitted! Admin will review and approve within 30 minutes.");
                    depForm.reset();
                } catch (err) {
                    console.error(err);
                    alert("Failed to submit request.");
                } finally {
                    btn.disabled = false;
                    btn.innerText = "Submit Request";
                }
            });
        }

        // ৪. উইথড্র রিকোয়েস্ট হ্যান্ডেলার
        const withForm = document.getElementById('withdraw-request-form');
        if (withForm) {
            withForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('btn-with-submit');
                const amount = Number(document.getElementById('with-amount').value);
                const upi = document.getElementById('with-upi').value.trim();
                
                const currentWinnings = window.currentPlayerData ? Number(window.currentPlayerData.winnings || 0) : 0;

                if (amount > currentWinnings) {
                    alert("🚫 Insufficient Winnings Balance! You cannot withdraw more than you won.");
                    return;
                }

                btn.disabled = true;
                btn.innerText = "Processing...";

                try {
                    await addDoc(collection(window.db, "paymentRequests"), {
                        uid: window.auth.currentUser.uid,
                        email: window.auth.currentUser.email,
                        amount: amount,
                        upi: window.Helpers ? window.Helpers.sanitizeInput(upi) : upi,
                        type: "withdraw",
                        status: "pending",
                        createdAt: new Date()
                    });
                    alert("🚀 Withdraw Request Registered! Cash will be credited to your UPI within 1 hour.");
                    withForm.reset();
                } catch (err) {
                    console.error(err);
                    alert("Failed to process withdrawal.");
                } finally {
                    btn.disabled = false;
                    btn.innerText = "Withdraw Cash";
                }
            });
        }
    })();
</script>
