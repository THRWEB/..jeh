<div class="px-4 py-4 space-y-6">
    
    <div class="flex flex-col items-center bg-gradient-to-b from-[#0f172a] to-[#060913] border border-slate-800 rounded-3xl p-6 text-center relative overflow-hidden shadow-xl">
        <div class="absolute -left-10 -top-10 w-32 h-32 bg-emerald-500/5 rounded-full blur-2xl"></div>
        
        <div class="w-20 h-20 bg-slate-800 border-2 border-[#f19006] rounded-full flex items-center justify-center text-3xl font-black text-white mb-3 shadow-lg select-none">
            👤
        </div>
        
        <h3 id="prof-player-email" class="text-sm font-bold text-white animate-pulse">Syncing Profile...</h3>
        <span class="bg-amber-500/10 text-[#f19006] text-[9px] font-black px-2.5 py-0.5 rounded-full border border-amber-500/20 uppercase tracking-widest mt-1">
            Elite Tier
        </span>
    </div>

    <div class="bg-[#0f172a] border border-slate-800 rounded-3xl p-5 space-y-4 shadow-lg">
        <h4 class="text-xs font-black text-slate-400 uppercase tracking-wider border-b border-slate-850 pb-2">🆔 Identity Matrix</h4>
        
        <div class="space-y-3">
            <div class="flex justify-between items-center bg-[#060913] p-3 rounded-xl border border-slate-900">
                <span class="text-[11px] text-slate-500 font-bold uppercase tracking-wider">Player ID</span>
                <code id="prof-player-id" class="text-xs font-mono font-bold text-slate-300 select-all">-------</code>
            </div>
            <div class="flex justify-between items-center bg-[#060913] p-3 rounded-xl border border-slate-900">
                <span class="text-[11px] text-slate-500 font-bold uppercase tracking-wider">Status</span>
                <span class="text-xs font-bold text-emerald-400 uppercase tracking-wide">Verified Account</span>
            </div>
        </div>
    </div>

    <div class="space-y-3">
        <a href="https://t.me/your_telegram_support" target="_blank" class="w-full bg-[#0f172a] border border-slate-800 text-slate-300 font-bold py-3.5 rounded-xl text-xs uppercase tracking-wider transition-all active:scale-[0.99] flex items-center justify-center gap-2">
            💬 Contact Telegram Support
        </a>
        
        <button id="btn-prof-logout" class="w-full bg-red-500/10 hover:bg-red-500 border border-red-500/20 text-red-400 hover:text-black font-black py-3.5 rounded-xl text-xs uppercase tracking-wider transition-all active:scale-[0.99]">
            Exit Arena (Logout)
        </button>
    </div>
</div>

<script>
    (function() {
        const emailDOM = document.getElementById('prof-player-email');
        const idDOM = document.getElementById('prof-player-id');
        const logoutBtn = document.getElementById('btn-prof-logout');
        
        const user = window.auth.currentUser;

        if (!user) {
            window.location.hash = "login";
            return;
        }

        // ১. ইউজারের প্রোফাইল ডাটা মেটা রেন্ডার করা
        if (emailDOM && idDOM) {
            emailDOM.innerText = user.email;
            idDOM.innerText = user.uid;
        }

        // ২. আমাদের প্রফেশনাল AuthService মডিউল ব্যবহার করে নিরাপদ লগআউট লজিক
        if (logoutBtn) {
            logoutBtn.addEventListener('click', async () => {
                if (confirm("Are you sure you want to exit the app?")) {
                    if (window.AuthService) {
                        await window.AuthService.logoutPlayer();
                    } else {
                        // ফলব্যাক যদি কোনো কারণে সার্ভিস মিসিং থাকে
                        import { signOut } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
                        await signOut(window.auth);
                        window.location.hash = "login";
                    }
                }
            });
        }
    })();
</script>
