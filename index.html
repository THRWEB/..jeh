<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>PROPLAYERADDA - Elite Arena</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  
  <style>
    /* --- CSS VARIABLES --- */
    :root {
        --bg-dark: #060913;       
        --accent-grad: linear-gradient(135deg, #fbbf24, #d97706); 
        --emerald-glow: rgba(16, 185, 129, 0.4);
        --nav-bg: rgba(15, 23, 42, 0.9);
        --active-color: #10b981; 
        --header-h: 70px;         
        --nav-h: 70px;            
    }

    /* --- UNIVERSAL RESET --- */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body { 
        background-color: var(--bg-dark) !important; 
        color: #f8fafc;
        font-family: 'Poppins', sans-serif;
        height: 100%;
        width: 100vw;
        overflow-x: hidden;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
    }

    body::-webkit-scrollbar { display: none; }

    /* --- HEADER DESIGN --- */
    header {
        position: fixed;
        top: 0; left: 0; width: 100%;
        height: var(--header-h);
        background: #060913;
        border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        z-index: 10000;
        display: flex; 
        align-items: center;
        padding: 0 16px;
    }

    .header-container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
    }

    .logo-section {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .battle-logo-custom {
        width: 42px;
        height: 42px;
        background: linear-gradient(135deg, #f19006, #d88105);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 10px rgba(241, 144, 6, 0.3);
    }

    .logo-text-custom {
        font-size: 20px;
        font-weight: 900;
        color: #ffffff;
        font-style: italic;
        letter-spacing: -0.03em;
        line-height: 1;
    }

    .logo-subtext-custom {
        font-size: 9px;
        font-weight: 700;
        color: #534327;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        margin-top: 2px;
    }

    .header-actions {
        display: flex;
        align-items: center;
        gap: 14px;
    }

    .notif-btn {
        width: 38px;
        height: 38px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .notif-btn:active { transform: scale(0.95); }
    
    .notif-icon {
        width: 20px;
        height: 20px;
        filter: invert(1) opacity(0.8);
    }

    .notif-dot {
        position: absolute;
        top: 8px;
        right: 9px;
        width: 6px;
        height: 6px;
        background-color: #ef4444;
        border-radius: 50%;
        box-shadow: 0 0 5px #ef4444;
        animation: pulse-red 2s infinite;
        display: block;
    }
    
    @keyframes pulse-red { 0% { opacity: 0.6; } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.6; } }

    .wallet-container-custom {
        display: flex;
        align-items: center;
        background: #0c111e;
        border: 1px solid #192239;
        border-radius: 100px;
        padding: 4px 4px 4px 18px;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .wallet-container-custom:active { transform: scale(0.97); }

    .currency-symbol {
        font-size: 15px;
        font-weight: 700;
        color: #ffffff;
        margin-right: 12px;
    }

    .plus-box {
        width: 34px;
        height: 34px;
        background: linear-gradient(135deg, #f19006, #d88105);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #000000;
        font-size: 22px;
        font-weight: 800;
    }

    /* --- NOTIFICATION OVERLAY --- */
    .notif-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(5, 7, 10, 0.6);
        backdrop-filter: blur(8px);
        z-index: 20000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
        display: flex;
        justify-content: flex-end;
    }

    .notif-overlay.open { opacity: 1; pointer-events: auto; }

    .notif-panel {
        width: 100%;
        max-width: 360px;
        height: 100%;
        background: rgba(15, 23, 42, 0.95);
        border-left: 1px solid rgba(255,255,255,0.05);
        box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        transform: translateX(100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
        padding-top: var(--header-h); 
    }

    .notif-overlay.open .notif-panel { transform: translateX(0); }

    .notif-header {
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .notif-title { color: #f19006; font-weight: 700; font-size: 18px; }
    .close-notif { color: #94a3b8; background: none; border: none; font-size: 24px; cursor: pointer; }
    .notif-list { flex: 1; overflow-y: auto; padding: 10px; }

    .notif-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        padding: 14px;
        margin-bottom: 12px;
        position: relative;
    }

    .notif-card::before {
        content: '';
        position: absolute;
        left: 0; top: 12px; bottom: 12px;
        width: 3px;
        background: #f19006;
        border-radius: 0 4px 4px 0;
    }

    .n-title { color: #e2e8f0; font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .n-body { color: #94a3b8; font-size: 12px; line-height: 1.4; }
    .n-time { display: block; text-align: right; font-size: 10px; color: #f19006; margin-top: 6px; }

    /* --- LOADER --- */
    #router-loader {
        position: fixed;
        top: var(--header-h); bottom: 0; left: 0; right: 0;
        z-index: 500;
        background-color: var(--bg-dark);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        transition: opacity 0.3s ease;
    }

    .energy-core { position: relative; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; }
    .core-outer { position: absolute; width: 100%; height: 100%; border: 2px solid transparent; border-left-color: #f19006; border-right-color: #f19006; border-radius: 50%; animation: core-rotate 1.2s infinite; }
    .core-inner { position: absolute; width: 70%; height: 70%; border: 2px solid transparent; border-top-color: var(--active-color); border-bottom-color: var(--active-color); border-radius: 50%; animation: core-rotate-rev 1s linear infinite; }
    @keyframes core-rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes core-rotate-rev { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }

    /* --- CONTENT AREA --- */
    #app-outlet {
        width: 100%; flex: 1;
        padding-top: var(--header-h); 
        padding-bottom: calc(var(--nav-h) + 50px);
    }

    /* --- BOTTOM DOCK --- */
    .bottom-nav {
        position: fixed !important;
        bottom: 20px; left: 5%; right: 5%; width: 90%; height: var(--nav-h);
        background: var(--nav-bg) !important;
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        display: flex; justify-content: space-around; align-items: center;
        border: 1px solid rgba(255, 255, 255, 0.05); z-index: 10000; border-radius: 25px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .nav-btn {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: #94a3b8; text-decoration: none; font-size: 10px; font-weight: 600;
        transition: all 0.3s ease; background: transparent; border: none; width: 20%;
        position: relative;
    }

    .nav-btn img { width: 22px; height: 22px; margin-bottom: 4px; filter: invert(1) opacity(0.5); }
    .nav-btn.active { color: #f19006 !important; }
    .nav-btn.active img { filter: invert(61%) sepia(85%) saturate(1943%) hue-rotate(15deg) brightness(97%) contrast(101%) !important; }

    .center-nav-wrapper {
        position: relative;
        width: 20%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .center-btn {
        background: var(--accent-grad) !important; 
        width: 58px !important; 
        height: 58px !important;
        border-radius: 50% !important; 
        border: 5px solid var(--bg-dark) !important;
        display: flex;
        align-items: center;
        justify-content: center;
        transform: translateY(-22px);
        box-shadow: 0 8px 20px rgba(241, 144, 6, 0.3);
    }
    
    .center-btn img { filter: brightness(0) !important; width: 24px; height: 24px; margin-bottom: 0; }
    
    .center-text {
        position: absolute;
        bottom: 6px;
        font-size: 10px;
        font-weight: 800;
        color: #f19006;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
  </style>
</head>

<body>

  <header>
    <div class="header-container">
      <div class="logo-section">
        <div class="battle-logo-custom">
          <svg class="w-6 h-6 text-[#060913]" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v3c0 2.44 1.72 4.48 4 4.92V18H5v2h14v-2h-2v-3.08c2.28-.44 4-2.48 4-4.92V7c0-1.1-.9-2-2-2zM5 10V7h2v3H5zm14 0h-2V7h2v3z"/>
          </svg>
        </div>
        <div>
          <h1 class="logo-text-custom">PROPLAYER<span class="text-[#f19006]">ADDA</span></h1>
          <p class="logo-subtext-custom">E-Sports Arena</p>
        </div>
      </div>
      
      <div class="header-actions">
          <button class="notif-btn" id="notif-trigger">
              <span class="notif-dot" id="notif-badge" style="display: none;"></span>
              <img src="https://cdn-icons-png.flaticon.com/512/3602/3602145.png" class="notif-icon">
          </button>

          <div id="walletDisplay" onclick="router.navigate('wallet')" class="wallet-container-custom">
            <span id="nav-wallet-amount" class="currency-symbol">₹00</span>
            <div class="plus-box">+</div>
          </div>
      </div>
    </div>
  </header>

  <div id="router-loader">
      <div class="energy-core">
          <div class="core-outer"></div>
          <div class="core-inner"></div>
      </div>
      <p class="mt-6 text-[9px] font-bold tracking-[0.4em] text-[#f19006] uppercase animate-pulse">Synchronizing</p>
  </div>

  <main id="app-outlet"></main>

  <div id="notification-overlay" class="notif-overlay">
      <div class="notif-panel">
          <div class="notif-header">
              <span class="notif-title">Notifications</span>
              <button class="close-notif" id="close-notif">&times;</button>
          </div>
          <div class="notif-list" id="notif-list-container">
              <div style="text-align:center; padding: 20px; color: #64748b;">No new updates.</div>
          </div>
      </div>
  </div>

  <nav class="bottom-nav">
    <button data-route="home" onclick="router.navigate('home')" class="nav-btn">
        <img src="https://cdn-icons-png.flaticon.com/512/1946/1946436.png">
        <span>Home</span>
    </button>

    <button data-route="mymatches" onclick="router.navigate('mymatches')" class="nav-btn">
        <img src="https://cdn-icons-png.flaticon.com/512/13/13973.png">
        <span>Matches</span>
    </button>

    <div class="center-nav-wrapper">
        <button data-route="refer" onclick="router.navigate('refer')" class="center-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/6537/6537740.png">
        </button>
        <span class="center-text">Refer</span>
    </div>

    <button data-route="profile" onclick="router.navigate('profile')" class="nav-btn">
        <img src="https://cdn-icons-png.flaticon.com/512/1144/1144760.png">
        <span>Profile</span>
    </button>

    <button data-route="wallet" onclick="router.navigate('wallet')" class="nav-btn">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135706.png">
        <span>Wallet</span>
    </button>
  </nav>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
        const notifBtn = document.getElementById('notif-trigger');
        const closeBtn = document.getElementById('close-notif');
        const overlay = document.getElementById('notification-overlay');
        const listContainer = document.getElementById('notif-list-container');
        const badge = document.getElementById('notif-badge');

        const toggleOverlay = (show) => {
            if (show) {
                overlay.classList.add('open');
                if (window.DbService) {
                    listContainer.innerHTML = '<div style="text-align:center; padding:20px; color:#f19006;">Syncing...</div>';
                    window.DbService.getNotifications().then(res => {
                        if (res.success) {
                            listContainer.innerHTML = '';
                            if (res.data.length === 0) {
                                listContainer.innerHTML = '<div style="text-align:center; padding:20px; color:#64748b;">No new notifications.</div>';
                                return;
                            }
                            if (badge) badge.style.display = 'none'; // প্যানেল খুললে ব্যাজ হাইড হবে
                            res.data.forEach(item => {
                                let timeStr = item.timestamp ? new Date(item.timestamp.seconds * 1000).toLocaleDateString() : "";
                                listContainer.innerHTML += `
                                    <div class="notif-card">
                                        <div class="n-title">${item.title || 'Update'}</div>
                                        <div class="n-body">${item.message || item.body || ''}</div>
                                        ${timeStr ? `<span class="n-time">${timeStr}</span>` : ''}
                                    </div>`;
                            });
                        } else {
                            listContainer.innerHTML = '<div style="text-align:center; color:#ef4444; padding:20px;">Failed to load.</div>';
                        }
                    });
                }
            } else {
                overlay.classList.remove('open');
            }
        };

        if(notifBtn) notifBtn.addEventListener('click', () => toggleOverlay(true));
        if(closeBtn) closeBtn.addEventListener('click', () => toggleOverlay(false));
        if(overlay) overlay.addEventListener('click', (e) => { if(e.target === overlay) toggleOverlay(false); });
    });
  </script>

  <script type="module" src="./src/app.js"></script>

</body>
</html>
